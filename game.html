```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reaction Chaos</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
cursor:none;
margin:0;
}

#game{
width:900px;
height:550px;
margin:auto;
background:#1b1b1b;
border:3px solid white;
position:relative;
overflow:hidden;
}

.obj{
position:absolute;
width:40px;
height:40px;
cursor:pointer;
}

.box{background:#00ff88;box-shadow:0 0 10px #00ff88;}
.fake{background:#ffaa00;}
.bomb{background:#ff0033;border-radius:50%;box-shadow:0 0 12px red;}
.mine{background:#990000;border-radius:50%;}
.sniper{background:#7700ff;border-radius:50%;}
.boss{
width:120px;
height:120px;
background:purple;
border-radius:50%;
box-shadow:0 0 20px purple;
}

.particle{
position:absolute;
width:5px;
height:5px;
background:white;
pointer-events:none;
}

#crosshair{
position:fixed;
width:20px;
height:20px;
border:2px solid white;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
}

#shop button{margin:4px;}

#announcer{
transition:transform .3s,opacity .3s;
font-size:28px;
height:30px;
}

.touch{
position:fixed;
bottom:20px;
right:20px;
width:80px;
height:80px;
background:#444;
border-radius:50%;
opacity:.5;
}

</style>
</head>

<body>

<h1>Reaction Chaos</h1>

<div>
Time: <span id="time">30</span>
| Snakes: <span id="snakes">0</span>
| Combo: <span id="combo">0</span>
| Wave: <span id="wave">1</span>
</div>

<div id="game"></div>

<div id="shop">
<button onclick="buySpawn()">Faster Spawn (5🐍)</button>
<button onclick="buySlow()">Slow Motion (8🐍)</button>
<button onclick="buyShield()">Shield (10🐍)</button>
</div>

<h2 id="announcer"></h2>
<h3 id="end"></h3>

<div id="crosshair"></div>
<div class="touch" id="touch"></div>

<script>

const game = document.getElementById("game")

let time = 30
let snakes = Number(localStorage.getItem("snakes")) || 0

let combo = 0
let multiplier = 1

let boxesClicked = 0
let bombsHit = 0
let totalClicks = 0

let spawnRate = 0.05
let wave = 1
let difficulty = 1

let shield = false
let slowMotion = false

let cursorX = 0
let cursorY = 0

let reactionTimes = []

let achievements = JSON.parse(localStorage.getItem("achievements") || "[]")
let leaderboard = JSON.parse(localStorage.getItem("leaderboard") || "[]")

/* ------------------ SOUND ------------------ */

const sounds={
click:new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg"),
bomb:new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg"),
combo:new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")
}

function playSound(s){
if(sounds[s]){
sounds[s].currentTime=0
sounds[s].play()
}
}

const music=new Audio("https://actions.google.com/sounds/v1/ambiences/barnyard.ogg")
music.loop=true
music.volume=.2
music.play()

/* ------------------ CURSOR ------------------ */

document.addEventListener("mousemove",e=>{
cursorX=e.clientX
cursorY=e.clientY
crosshair.style.left=cursorX+"px"
crosshair.style.top=cursorY+"px"
})

document.getElementById("touch").ontouchstart=()=>spawnBox()

/* ------------------ UI ------------------ */

function updateUI(){
timeSpan.textContent=time
snakesSpan.textContent=snakes
comboSpan.textContent=combo
waveSpan.textContent=wave
}

const timeSpan=document.getElementById("time")
const snakesSpan=document.getElementById("snakes")
const comboSpan=document.getElementById("combo")
const waveSpan=document.getElementById("wave")

function announcer(msg){
const a=document.getElementById("announcer")
a.textContent=msg
a.style.transform="scale(1.3)"
a.style.opacity=1

setTimeout(()=>{
a.style.transform="scale(1)"
a.style.opacity=0
},800)
}

/* ------------------ PARTICLES ------------------ */

function particles(x,y){

for(let i=0;i<10;i++){

const p=document.createElement("div")
p.className="particle"

let vx=Math.random()*6-3
let vy=Math.random()*6-3

p.style.left=x+"px"
p.style.top=y+"px"

game.appendChild(p)

let life=20

const move=setInterval(()=>{

x+=vx
y+=vy

p.style.left=x+"px"
p.style.top=y+"px"

life--

if(life<=0){
clearInterval(move)
p.remove()
}

},16)

}

}

/* ------------------ SHAKE ------------------ */

function shake(){
document.body.style.transform=
"translate("+(Math.random()*10-5)+"px,"+(Math.random()*10-5)+"px)"

setTimeout(()=>{
document.body.style.transform="translate(0,0)"
},100)
}

/* ------------------ BOSS ------------------ */

function spawnBoss(){

const boss=document.createElement("div")
boss.className="obj boss"

boss.style.left="400px"
boss.style.top="200px"

let hp=25

boss.onclick=()=>{

hp--
playSound("click")

particles(450,250)

if(hp<=0){

snakes+=25
announcer("BOSS DEFEATED")
boss.remove()

}

}

game.appendChild(boss)

}

/* ------------------ SPAWN ------------------ */

function spawnBox(){

const obj=document.createElement("div")
obj.classList.add("obj")

let type=Math.random()

if(type<0.45)obj.classList.add("box")
else if(type<0.6)obj.classList.add("fake")
else if(type<0.75)obj.classList.add("bomb")
else if(type<0.9)obj.classList.add("mine")
else obj.classList.add("sniper")

let x=Math.random()*(game.clientWidth-40)
let y=Math.random()*(game.clientHeight-40)

obj.style.left=x+"px"
obj.style.top=y+"px"

const spawnTime=Date.now()

/* seeker bomb */

if(obj.classList.contains("bomb")){

const ai=setInterval(()=>{

const rect=obj.getBoundingClientRect()

let dx=cursorX-rect.left
let dy=cursorY-rect.top

x+=dx*0.02
y+=dy*0.02

obj.style.left=x+"px"
obj.style.top=y+"px"

},16)

setTimeout(()=>{
particles(x,y)
obj.remove()
clearInterval(ai)
},4000)

}

/* sniper */

if(obj.classList.contains("sniper")){

setTimeout(()=>{

particles(x,y)
time-=10
obj.remove()

},2000)

}

/* mine */

if(obj.classList.contains("mine")){
setTimeout(()=>{
particles(x,y)
obj.remove()
},3000)
}

/* moving boxes */

if(obj.classList.contains("box")){

const move=setInterval(()=>{

x+=Math.random()*6-3
y+=Math.random()*6-3

obj.style.left=x+"px"
obj.style.top=y+"px"

},80)

setTimeout(()=>{
clearInterval(move)
obj.remove()
},2000)

}

obj.onclick=()=>{

totalClicks++

const reaction=Date.now()-spawnTime
reactionTimes.push(reaction)

const rect=obj.getBoundingClientRect()

particles(rect.left,rect.top)

if(obj.classList.contains("bomb")||obj.classList.contains("mine")||obj.classList.contains("sniper")){

bombsHit++
combo=0
multiplier=1

playSound("bomb")

if(!shield){
time-=30
shake()
}

shield=false

}

else if(obj.classList.contains("fake")){

time-=5
combo=0

}

else{

boxesClicked++
combo++
snakes++

playSound("click")

if(combo%5==0){
multiplier++
announcer("INSANE COMBO x"+multiplier)
playSound("combo")
}

let gain=5*multiplier
time+=gain

}

obj.remove()
updateUI()

}

game.appendChild(obj)

}

/* ------------------ ACHIEVEMENTS ------------------ */

function checkAchievements(){

if(boxesClicked>=50 && !achievements.includes("shooter")){
achievements.push("shooter")
announcer("Achievement: Sharp Shooter")
}

if(combo>=20 && !achievements.includes("combo")){
achievements.push("combo")
announcer("Achievement: Combo Master")
}

localStorage.setItem("achievements",JSON.stringify(achievements))

}

/* ------------------ WAVES ------------------ */

function nextWave(){

wave++
difficulty+=0.3
spawnRate+=0.01

announcer("WAVE "+wave)

if(wave%5===0){
spawnBoss()
}

}

/* ------------------ STATS ------------------ */

function avgReaction(){
let s=0
reactionTimes.forEach(v=>s+=v)
return Math.round(s/(reactionTimes.length||1))
}

function accuracy(){
return boxesClicked/(totalClicks||1)
}

function rank(){

let a=accuracy()

if(a>0.95)return"S"
if(a>0.85)return"A"
if(a>0.7)return"B"
if(a>0.5)return"C"
if(a>0.3)return"D"
return"F"

}

/* ------------------ ONLINE SCORE ------------------ */

async function sendScore(score){

try{
await fetch("https://example.com/leaderboard",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({score})
})
}catch{}

}

/* ------------------ GAME END ------------------ */

function endGame(){

clearInterval(loop)
clearInterval(timer)

localStorage.setItem("snakes",snakes)

sendScore(snakes)

leaderboard.push({
rank:rank(),
accuracy:accuracy(),
reaction:avgReaction()
})

leaderboard.sort((a,b)=>b.accuracy-a.accuracy)
leaderboard=leaderboard.slice(0,5)

localStorage.setItem("leaderboard",JSON.stringify(leaderboard))

let board="Leaderboard<br>"

leaderboard.forEach((e,i)=>{
board+=`${i+1}. ${e.rank} - ${(e.accuracy*100).toFixed(1)}%<br>`
})

end.innerHTML=
`
Game Over<br>
Snakes: ${snakes}<br>
Boxes: ${boxesClicked}<br>
Bombs: ${bombsHit}<br>
Accuracy: ${(accuracy()*100).toFixed(1)}%<br>
Reaction: ${avgReaction()} ms<br>
Rank: ${rank()}<br><br>
${board}
`

}

/* ------------------ SHOP ------------------ */

function buySpawn(){
if(snakes>=5){
snakes-=5
spawnRate+=0.02
}
}

function buySlow(){
if(snakes>=8){
snakes-=8
slowMotion=true
announcer("SLOW MOTION")

setTimeout(()=>{
slowMotion=false
},5000)
}
}

function buyShield(){
if(snakes>=10){
snakes-=10
shield=true
announcer("SHIELD")
}
}

/* ------------------ LOOP ------------------ */

function loopGame(){

if(Math.random()<spawnRate*difficulty){
spawnBox()
}

checkAchievements()

}

const loop=setInterval(loopGame,50)

const timer=setInterval(()=>{

time--

if(time<=0) endGame()

if(time%20===0) nextWave()

updateUI()

},1000)

updateUI()

</script>

</body>
</html>
```
