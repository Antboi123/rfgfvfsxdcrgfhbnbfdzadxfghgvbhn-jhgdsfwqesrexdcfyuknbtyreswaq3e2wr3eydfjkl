<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reaction Chaos</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
cursor:none;
}

#game{
width:900px;
height:550px;
margin:auto;
background:#1b1b1b;
border:3px solid white;
position:relative;
overflow:hidden;
}

.obj{
position:absolute;
width:40px;
height:40px;
cursor:pointer;
}

.box{
background:#00ff88;
box-shadow:0 0 10px #00ff88;
}

.fake{
background:#ffaa00;
}

.bomb{
background:#ff0033;
border-radius:50%;
box-shadow:0 0 12px red;
}

.mine{
background:#990000;
border-radius:50%;
}

.particle{
position:absolute;
width:5px;
height:5px;
background:white;
pointer-events:none;
}

#crosshair{
position:fixed;
width:20px;
height:20px;
border:2px solid white;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
}

#shop button{
margin:4px;
}

</style>
</head>
<body>

<h1>Reaction Chaos</h1>

<div>
Time: <span id="time">30</span>
| Snakes: <span id="snakes">0</span>
| Combo: <span id="combo">0</span>
</div>

<div id="game"></div>

<div id="shop">
<button onclick="buySpawn()">Faster Spawn (5🐍)</button>
<button onclick="buySlow()">Slow Motion (8🐍)</button>
<button onclick="buyShield()">Shield (10🐍)</button>
</div>

<h2 id="announcer"></h2>
<h3 id="end"></h3>

<div id="crosshair"></div>

<script>

const game = document.getElementById("game")

let time = 30
let snakes = Number(localStorage.getItem("snakes")) || 0

let combo = 0
let multiplier = 1

let boxesClicked = 0
let bombsHit = 0
let totalClicks = 0

let spawnRate = 0.05

let shield = false
let slowMotion = false

let cursorX = 0
let cursorY = 0

let reactionTimes = []

let leaderboard = JSON.parse(localStorage.getItem("leaderboard") || "[]")

document.addEventListener("mousemove",e=>{
cursorX=e.clientX
cursorY=e.clientY
document.getElementById("crosshair").style.left=cursorX+"px"
document.getElementById("crosshair").style.top=cursorY+"px"
})

function updateUI(){

document.getElementById("time").textContent=time
document.getElementById("snakes").textContent=snakes
document.getElementById("combo").textContent=combo

}

function particles(x,y){

for(let i=0;i<10;i++){

const p=document.createElement("div")
p.className="particle"

let vx=Math.random()*6-3
let vy=Math.random()*6-3

p.style.left=x+"px"
p.style.top=y+"px"

game.appendChild(p)

let life=20

const move=setInterval(()=>{

x+=vx
y+=vy

p.style.left=x+"px"
p.style.top=y+"px"

life--

if(life<=0){
clearInterval(move)
p.remove()
}

},16)

}

}

function shake(){

document.body.style.transform="translate("+ (Math.random()*10-5) +"px,"+(Math.random()*10-5)+"px)"

setTimeout(()=>{
document.body.style.transform="translate(0,0)"
},100)

}

function announcer(msg){

const a=document.getElementById("announcer")
a.textContent=msg

setTimeout(()=>a.textContent="",1000)

}

function spawnBox(){

const obj=document.createElement("div")
obj.classList.add("obj")

let type=Math.random()

if(type<0.5)obj.classList.add("box")
else if(type<0.65)obj.classList.add("fake")
else if(type<0.8)obj.classList.add("bomb")
else obj.classList.add("mine")

let x=Math.random()*(game.clientWidth-40)
let y=Math.random()*(game.clientHeight-40)

obj.style.left=x+"px"
obj.style.top=y+"px"

const spawnTime=Date.now()

// seeker bomb
if(obj.classList.contains("bomb")){

const ai=setInterval(()=>{

const rect=obj.getBoundingClientRect()

let dx=cursorX-rect.left
let dy=cursorY-rect.top

x+=dx*0.02
y+=dy*0.02

obj.style.left=x+"px"
obj.style.top=y+"px"

},16)

setTimeout(()=>{
particles(x,y)
obj.remove()
clearInterval(ai)
},4000)

}

// mine bomb explode
if(obj.classList.contains("mine")){

setTimeout(()=>{
particles(x,y)
obj.remove()
},3000)

}

// moving boxes
if(obj.classList.contains("box")){

const move=setInterval(()=>{

x+=Math.random()*6-3
y+=Math.random()*6-3

obj.style.left=x+"px"
obj.style.top=y+"px"

},80)

setTimeout(()=>{
clearInterval(move)
obj.remove()
},2000)

}

obj.onclick=()=>{

totalClicks++

const reaction=Date.now()-spawnTime
reactionTimes.push(reaction)

const rect=obj.getBoundingClientRect()

particles(rect.left,rect.top)

if(obj.classList.contains("bomb")||obj.classList.contains("mine")){

bombsHit++
combo=0
multiplier=1

if(!shield){
time-=30
shake()
}

shield=false

}

else if(obj.classList.contains("fake")){

time-=5
combo=0

}

else{

boxesClicked++
combo++
snakes++

if(combo%5==0){
multiplier++
announcer("INSANE COMBO x"+multiplier)
}

let gain=5*multiplier
time+=gain

}

obj.remove()
updateUI()

}

game.appendChild(obj)

}

function avgReaction(){

let s=0
reactionTimes.forEach(v=>s+=v)
return Math.round(s/(reactionTimes.length||1))

}

function accuracy(){
return boxesClicked/(totalClicks||1)
}

function rank(){

let a=accuracy()

if(a>0.95)return"S"
if(a>0.85)return"A"
if(a>0.7)return"B"
if(a>0.5)return"C"
if(a>0.3)return"D"
return"F"

}

function endGame(){

clearInterval(loop)
clearInterval(timer)

localStorage.setItem("snakes",snakes)

leaderboard.push({
rank:rank(),
accuracy:accuracy(),
reaction:avgReaction()
})

leaderboard.sort((a,b)=>b.accuracy-a.accuracy)

leaderboard=leaderboard.slice(0,5)

localStorage.setItem("leaderboard",JSON.stringify(leaderboard))

let board="Leaderboard<br>"

leaderboard.forEach((e,i)=>{
board+=`${i+1}. ${e.rank} - ${(e.accuracy*100).toFixed(1)}%<br>`
})

document.getElementById("end").innerHTML=
`
Game Over<br>
Snakes: ${snakes}<br>
Boxes: ${boxesClicked}<br>
Bombs: ${bombsHit}<br>
Accuracy: ${(accuracy()*100).toFixed(1)}%<br>
Reaction: ${avgReaction()} ms<br>
Rank: ${rank()}<br><br>
${board}
`

}

function buySpawn(){

if(snakes>=5){
snakes-=5
spawnRate+=0.02
}

}

function buySlow(){

if(snakes>=8){

snakes-=8
slowMotion=true
announcer("SLOW MOTION")

setTimeout(()=>{
slowMotion=false
},5000)

}

}

function buyShield(){

if(snakes>=10){
snakes-=10
shield=true
announcer("SHIELD")
}

}

function loopGame(){

if(Math.random()<spawnRate){

spawnBox()

}

}

const loop=setInterval(loopGame, slowMotion ? 120 : 50)

const timer=setInterval(()=>{

time--

if(time<=0) endGame()

updateUI()

},1000)

updateUI()

</script>

</body>
</html>
