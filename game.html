```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reaction Chaos Arcade</title>

<style>

body{
background:#0e0e0e;
color:white;
font-family:Arial;
text-align:center;
margin:0;
overflow:hidden;
}

#game{
width:900px;
height:550px;
background:#181818;
margin:auto;
border:3px solid white;
position:relative;
overflow:hidden;
}

.obj{
position:absolute;
width:40px;
height:40px;
cursor:pointer;
}

.box{background:#00ff88;}
.bomb{background:#ff0033;border-radius:50%;}
.mine{background:#990000;border-radius:50%;}
.fake{background:orange;}

.boss{
width:120px;
height:120px;
background:purple;
border-radius:50%;
box-shadow:0 0 20px purple;
}

#ui{
margin-top:10px;
font-size:18px;
}

#announcer{
font-size:26px;
height:30px;
transition:transform .3s, opacity .3s;
}

#shop button{
margin:4px;
}

.touchBtn{
position:fixed;
bottom:20px;
right:20px;
width:80px;
height:80px;
background:#444;
border-radius:50%;
opacity:0.5;
}

</style>
</head>

<body>

<h1>Reaction Chaos Arcade</h1>

<div id="ui">
Time: <span id="time">30</span>
| Snakes: <span id="snakes">0</span>
| Wave: <span id="wave">1</span>
</div>

<div id="announcer"></div>

<div id="game"></div>

<div id="shop">
<button onclick="buySpawn()">Faster Spawn (5🐍)</button>
<button onclick="buyShield()">Shield (10🐍)</button>
<button onclick="buySlow()">Slow Motion (8🐍)</button>
</div>

<div id="touchShoot" class="touchBtn"></div>

<script>

/* ------------------ GAME STATE ------------------ */

const game = document.getElementById("game")

let time = 30
let snakes = Number(localStorage.getItem("snakes")) || 0

let combo = 0
let multiplier = 1

let wave = 1
let difficulty = 1

let boxesClicked = 0
let bombsHit = 0
let totalClicks = 0

let spawnRate = 0.05

let shield = false
let slowMotion = false

let cursorX=0
let cursorY=0

let achievements = JSON.parse(localStorage.getItem("achievements")||"[]")

let leaderboardURL = "https://example.com/leaderboard" // placeholder

/* ------------------ SOUND SYSTEM ------------------ */

const sounds={
click:new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg"),
bomb:new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg"),
combo:new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")
}

function playSound(name){
if(sounds[name]){
sounds[name].currentTime=0
sounds[name].play()
}
}

/* ------------------ MUSIC ------------------ */

const music = new Audio("https://actions.google.com/sounds/v1/ambiences/barnyard.ogg")
music.loop=true
music.volume=0.2
music.play()

/* ------------------ INPUT ------------------ */

document.addEventListener("mousemove",e=>{
cursorX=e.clientX
cursorY=e.clientY
})

document.getElementById("touchShoot").ontouchstart=()=>spawnBox()

/* ------------------ UI ------------------ */

function updateUI(){

document.getElementById("time").textContent=time
document.getElementById("snakes").textContent=snakes
document.getElementById("wave").textContent=wave

}

function announce(msg){

const a=document.getElementById("announcer")

a.textContent=msg
a.style.transform="scale(1.3)"
a.style.opacity=1

setTimeout(()=>{
a.style.transform="scale(1)"
a.style.opacity=0
},800)

}

/* ------------------ SPAWNING ------------------ */

function spawnBox(){

const obj=document.createElement("div")
obj.classList.add("obj")

let r=Math.random()

if(r<0.5)obj.classList.add("box")
else if(r<0.65)obj.classList.add("fake")
else if(r<0.85)obj.classList.add("bomb")
else obj.classList.add("mine")

let x=Math.random()*(game.clientWidth-40)
let y=Math.random()*(game.clientHeight-40)

obj.style.left=x+"px"
obj.style.top=y+"px"

obj.onclick=()=>handleClick(obj)

game.appendChild(obj)

}

/* ------------------ BOSS ------------------ */

function spawnBoss(){

const boss=document.createElement("div")
boss.className="obj boss"

boss.style.left="400px"
boss.style.top="200px"

let hp=20

boss.onclick=()=>{

hp--
playSound("click")

if(hp<=0){

snakes+=20
announce("BOSS DEFEATED")
boss.remove()

}

}

game.appendChild(boss)

}

/* ------------------ CLICK LOGIC ------------------ */

function handleClick(obj){

totalClicks++

if(obj.classList.contains("bomb")||obj.classList.contains("mine")){

bombsHit++
combo=0
multiplier=1

playSound("bomb")

if(!shield) time-=20

shield=false

}

else if(obj.classList.contains("fake")){

time-=5

}

else{

boxesClicked++
combo++

playSound("click")

if(combo%5==0){

multiplier++
announce("COMBO x"+multiplier)
playSound("combo")

}

let gain=5*multiplier
time+=gain
snakes++

}

obj.remove()
updateUI()

}

/* ------------------ WAVES ------------------ */

function nextWave(){

wave++
difficulty+=0.3

spawnRate+=0.01

announce("WAVE "+wave)

if(wave%5==0){

spawnBoss()

}

}

/* ------------------ ACHIEVEMENTS ------------------ */

function checkAchievements(){

if(boxesClicked>=50 && !achievements.includes("shooter")){
achievements.push("shooter")
announce("Achievement: Sharp Shooter")
}

if(combo>=20 && !achievements.includes("combo")){
achievements.push("combo")
announce("Achievement: Combo Master")
}

localStorage.setItem("achievements",JSON.stringify(achievements))

}

/* ------------------ ONLINE LEADERBOARD ------------------ */

async function sendScore(score){

try{

await fetch(leaderboardURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({score})
})

}catch(e){}

}

/* ------------------ GAME LOOP ------------------ */

function gameLoop(){

if(Math.random()<spawnRate*difficulty){
spawnBox()
}

checkAchievements()

}

const loop=setInterval(gameLoop,50)

/* ------------------ TIMER ------------------ */

const timer=setInterval(()=>{

time--

if(time<=0){

clearInterval(loop)
clearInterval(timer)

sendScore(snakes)

announce("GAME OVER")

}

if(time%20==0){
nextWave()
}

updateUI()

},1000)

updateUI()

</script>

</body>
</html>
